{% assign status_context = include.context | default: page.status_context | default: 'SYSTEM READY // KM.III.IV' %}
<div class="status-bar">
  <span><span class="pulse"></span>SYSTEM ONLINE // {{ site.title }}</span>
  <span data-status-clock>00:00:00 SAST</span>
  <span>{{ status_context }}</span>
</div>
